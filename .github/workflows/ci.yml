name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run test:run -- --coverage

  wolves-movie-flow:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install chromium
      - name: Run Wolves movie flow browser test
        env:
          WOLVES_BROWSER_FIXTURES: '1'
        run: |
          npm run dev -- --host 127.0.0.1 &
          DEV_PID=$!
          for _ in $(seq 1 60); do
            if curl -s http://127.0.0.1:5173/ >/dev/null; then
              break
            fi
            sleep 1
          done
          node tests/wolves-movie-flow.mjs
          RESULT=$?
          kill $DEV_PID
          exit $RESULT
