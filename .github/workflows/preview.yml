name: Cloudflare Pages Preview

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: cloudflare-pages-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Restore live data from cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            public/stream-versions.yml
            public/dakota-versions.json
            public/knuckle-versions.json
            src/assets/svg/growth_bluefins.svg
          key: website-live-data-
          restore-keys: |
            website-live-data-
          fail-on-cache-miss: false

      - name: Setup Node.js
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/pages-action@f0a1cd58cd66095dee69bfa18fa5efd1dde93bca # v1.5.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: ${{ github.event.repository.name }}
          directory: dist
          branch: ${{ github.event.pull_request.head.ref }}

      - name: Comment preview URL on PR
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        env:
          PREVIEW_URL: ${{ steps.deploy.outputs.alias || steps.deploy.outputs.url }}
        with:
          script: |
            const marker = '<!-- cloudflare-pages-preview -->'
            const body = `${marker}\n🔍 Cloudflare Pages preview: ${process.env.PREVIEW_URL}`
            const issue_number = context.issue.number
            const comments = await github.paginate(github.rest.issues.listComments, {
              ...context.repo,
              issue_number,
            })
            const existing = comments.find(comment =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker),
            )

            if (existing) {
              await github.rest.issues.updateComment({
                ...context.repo,
                comment_id: existing.id,
                body,
              })
            }
            else {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number,
                body,
              })
            }
