name: Cloudflare Pages Preview

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: cloudflare-pages-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    if: >
      github.event.pull_request.head.repo.full_name == github.repository &&
      vars.CLOUDFLARE_PAGES_ENABLED == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Restore live data from cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: |
            public/stream-versions.yml
            public/dakota-versions.json
            public/knuckle-versions.json
            src/assets/svg/growth_bluefins.svg
          key: website-live-data-
          restore-keys: |
            website-live-data-
          fail-on-cache-miss: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/pages-action@f0a1cd58cd66095dee69bfa18fa5efd1dde93bca # v1.5.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: ${{ github.event.repository.name }}
          directory: dist
          branch: ${{ github.event.pull_request.head.ref }}

      - name: Comment preview URL on PR
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          PREVIEW_URL: ${{ steps.deploy.outputs.alias || steps.deploy.outputs.url }}
        with:
          script: |
            const marker = '<!-- cloudflare-pages-preview -->'
            const body = `${marker}\n🔍 Cloudflare Pages preview: ${process.env.PREVIEW_URL}`
            const issue_number = context.issue.number
            const comments = await github.paginate(github.rest.issues.listComments, {
              ...context.repo,
              issue_number,
            })
            const existing = comments.find(comment =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker),
            )
            if (existing) {
              await github.rest.issues.updateComment({
                ...context.repo,
                comment_id: existing.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number,
                body,
              })
            }
